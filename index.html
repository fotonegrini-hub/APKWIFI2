<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator · Desktop Moderno</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #e6e9ef;
            --bg-card: rgba(255, 255, 255, 0.7);
            --bg-card-hover: rgba(255, 255, 255, 0.85);
            --text-primary: #1a1e2b;
            --text-secondary: #2d3443;
            --text-muted: #5e677c;
            --border-color: rgba(255, 255, 255, 0.5);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.7);
            --input-border: rgba(0, 0, 0, 0.06);
            --qr-bg: white;
            --tab-bg: rgba(0, 0, 0, 0.02);
            --tab-active: #ffffff;
            --btn-primary: #2563eb;
            --btn-primary-hover: #1d4ed8;
            --btn-success: #059669;
            --btn-success-hover: #047857;
            --btn-download: #7c3aed;
            --btn-download-hover: #6d28d9;
            --icon-color: #2563eb;
            --badge-bg: rgba(5, 150, 105, 0.08);
            --badge-color: #047857;
            --transition: all 0.3s ease;
            --wifi-info-bg: rgba(37, 99, 235, 0.06);
            --wifi-info-border: rgba(37, 99, 235, 0.12);
        }

        [data-theme="dark"] {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: rgba(30, 34, 48, 0.85);
            --bg-card-hover: rgba(40, 45, 63, 0.9);
            --text-primary: #e8edf5;
            --text-secondary: #d0d6e0;
            --text-muted: #8a94a8;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(40, 45, 63, 0.6);
            --input-border: rgba(255, 255, 255, 0.08);
            --qr-bg: #1a1d27;
            --tab-bg: rgba(255, 255, 255, 0.03);
            --tab-active: #2a2f42;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-success: #10b981;
            --btn-success-hover: #059669;
            --btn-download: #8b5cf6;
            --btn-download-hover: #7c3aed;
            --icon-color: #60a5fa;
            --badge-bg: rgba(16, 185, 129, 0.12);
            --badge-color: #34d399;
            --wifi-info-bg: rgba(59, 130, 246, 0.1);
            --wifi-info-border: rgba(59, 130, 246, 0.2);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px;
            transition: var(--transition);
        }

        .app-container {
            max-width: 1100px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 36px 40px 40px;
            box-shadow: 0 30px 50px var(--shadow-color), 0 10px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            color: var(--icon-color);
            font-size: 30px;
            background: rgba(37, 99, 235, 0.12);
            padding: 10px;
            border-radius: 18px;
            transition: var(--transition);
        }

        .theme-toggle {
            background: var(--tab-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }

        .theme-toggle:hover {
            background: var(--bg-card-hover);
            transform: scale(0.98);
        }

        .theme-toggle i {
            font-size: 18px;
            transition: var(--transition);
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            background: var(--tab-bg);
            padding: 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            transition: var(--transition);
        }

        .tab-btn {
            flex: 1 0 auto;
            background: transparent;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: 550;
            font-size: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: -0.2px;
        }

        .tab-btn i {
            font-size: 16px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .tab-btn:hover {
            background: rgba(37, 99, 235, 0.06);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--tab-active);
            box-shadow: 0 6px 14px var(--shadow-color), 0 2px 4px rgba(0, 0, 0, 0.02);
            color: var(--text-primary);
            font-weight: 600;
        }

        .tab-btn.active i {
            color: var(--icon-color);
        }

        .tab-content {
            display: block;
            animation: fadeSlide 0.2s ease;
        }

        .tab-content.hidden {
            display: none;
        }

        @keyframes fadeSlide {
            0% { opacity: 0.5; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: -0.2px;
            transition: var(--transition);
        }

        .input-group .field-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-with-icon i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 16px;
            transition: var(--transition);
        }

        .field-with-icon input, 
        .field-with-icon select {
            width: 100%;
            padding: 14px 14px 14px 48px;
            border: 1px solid var(--input-border);
            border-radius: 24px;
            background: var(--input-bg);
            backdrop-filter: blur(4px);
            font-size: 15px;
            transition: var(--transition);
            color: var(--text-primary);
            outline: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }

        .field-with-icon input:focus,
        .field-with-icon select:focus {
            border-color: var(--btn-primary);
            background: var(--bg-card-hover);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }

        .field-with-icon input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 550;
            font-size: 15px;
            border: none;
            background: var(--tab-active);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 8px var(--shadow-color);
            border: 1px solid var(--input-border);
            flex: 1 1 auto;
        }

        .btn-primary {
            background: var(--btn-primary);
            color: white;
            border: none;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
        }

        .btn-primary:hover {
            background: var(--btn-primary-hover);
            transform: scale(0.98);
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--input-border);
        }

        .btn-outline:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-muted);
        }

        .btn-success {
            background: var(--btn-success);
            color: white;
            border: none;
            box-shadow: 0 8px 18px rgba(5, 150, 105, 0.2);
        }

        .btn-success:hover {
            background: var(--btn-success-hover);
            transform: scale(0.98);
        }

        .btn-download {
            background: var(--btn-download);
            color: white;
            border: none;
            box-shadow: 0 8px 18px rgba(124, 58, 237, 0.25);
        }

        .btn-download:hover {
            background: var(--btn-download-hover);
            transform: scale(0.98);
            box-shadow: 0 6px 14px rgba(124, 58, 237, 0.3);
        }

        .qr-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 32px 16px;
            border: 1px solid var(--border-color);
            min-height: 300px;
            transition: var(--transition);
        }

        #qrcode {
            background: var(--qr-bg);
            padding: 18px;
            border-radius: 28px;
            box-shadow: 0 16px 30px var(--shadow-color);
            display: inline-block;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        #qrcode img, #qrcode canvas {
            display: block;
            width: 180px;
            height: 180px;
            border-radius: 16px;
        }

        .qr-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: center;
            word-break: break-all;
            max-width: 260px;
            transition: var(--transition);
        }

        .qr-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            transition: var(--transition);
        }

        .test-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--badge-bg);
            padding: 8px 18px;
            border-radius: 40px;
            color: var(--badge-color);
            font-weight: 500;
            font-size: 14px;
            margin-top: 12px;
            transition: var(--transition);
        }

        .test-badge i {
            font-size: 14px;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .mt-2 { margin-top: 8px; }
        .text-muted { color: var(--text-muted); font-size: 14px; }

        .download-container {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* --- Wi-Fi Info --- */
        .wifi-info-container {
            margin-top: 16px;
            padding: 14px 18px;
            background: var(--wifi-info-bg);
            border: 1px solid var(--wifi-info-border);
            border-radius: 20px;
            width: 100%;
            max-width: 280px;
            transition: var(--transition);
        }

        .wifi-info-container.hidden {
            display: none;
        }

        .wifi-info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }

        .wifi-info-header i {
            color: var(--icon-color);
            font-size: 16px;
        }

        .wifi-devices-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .wifi-device-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--input-border);
            transition: var(--transition);
        }

        .wifi-device-item i {
            font-size: 12px;
            color: var(--btn-success);
        }

        .wifi-device-count {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
        }

        .wifi-refresh-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: var(--transition);
            font-size: 13px;
        }

        .wifi-refresh-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .wifi-loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .wifi-loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 800px) {
            .app-container {
                padding: 24px 16px;
                border-radius: 32px;
            }
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 10px 12px;
                flex: 1;
            }
            .btn {
                padding: 12px 18px;
                font-size: 14px;
            }
            .header-container {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .tab-btn {
                font-size: 12px;
                padding: 8px 8px;
                gap: 6px;
            }
            .tab-btn i {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-container">
        <h1>
            <i class="fas fa-qrcode"></i> 
            Gerador QR Code · Desktop
        </h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
            <i class="fas fa-moon"></i>
            <span id="themeLabel">Claro</span>
        </button>
    </div>

    <div class="grid-2col">
        <div>
            <div class="tabs" id="tabHeaders">
                <button class="tab-btn active" data-tab="urlTab"><i class="fas fa-link"></i> URL</button>
                <button class="tab-btn" data-tab="whatsappTab"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                <button class="tab-btn" data-tab="wifiTab"><i class="fas fa-wifi"></i> Wi-Fi</button>
            </div>

            <div id="urlTab" class="tab-content">
                <div class="input-group">
                    <label><i class="fas fa-globe" style="margin-right: 6px;"></i> Endereço URL</label>
                    <div class="field-with-icon">
                        <i class="fas fa-link"></i>
                        <input type="url" id="urlInput" placeholder="https://exemplo.com" value="https://www.example.com">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateFromCurrentTab()"><i class="fas fa-qrcode"></i> Gerar QR</button>
                    <button class="btn btn-outline" onclick="testCurrentTab()"><i class="fas fa-play"></i> Testar</button>
                </div>
            </div>

            <div id="whatsappTab" class="tab-content hidden">
                <div class="input-group">
                    <label><i class="fab fa-whatsapp"></i> Telefone (55 + DDD + Número)</label>
                    <div class="field-with-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="whatsappInput" placeholder="5511999999999" value="5511999999999">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateFromCurrentTab()"><i class="fas fa-qrcode"></i> Gerar QR</button>
                    <button class="btn btn-outline" onclick="testCurrentTab()"><i class="fas fa-play"></i> Testar</button>
                </div>
            </div>

            <div id="wifiTab" class="tab-content hidden">
                <div class="input-group">
                    <label>Nome da Rede (SSID)</label>
                    <div class="field-with-icon">
                        <i class="fas fa-network-wired"></i>
                        <input type="text" id="wifiSSID" placeholder="Minha Rede" value="Café Wi-Fi">
                    </div>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <div class="field-with-icon">
                        <i class="fas fa-key"></i>
                        <input type="text" id="wifiPassword" placeholder="senha123" value="12345678">
                    </div>
                </div>
                <div class="input-group">
                    <label>Tipo de Segurança</label>
                    <div class="field-with-icon">
                        <i class="fas fa-shield-alt"></i>
                        <select id="wifiSecurity">
                            <option value="WPA" selected>WPA/WPA2</option>
                            <option value="WEP">WEP</option>
                            <option value="nopass">Sem senha (nopass)</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateFromCurrentTab()"><i class="fas fa-qrcode"></i> Gerar QR</button>
                    <button class="btn btn-outline" onclick="testCurrentTab()"><i class="fas fa-play"></i> Testar</button>
                </div>
            </div>

            <div style="margin-top: 20px; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--input-border); padding-top: 18px; transition: var(--transition);">
                <i class="fas fa-lightbulb" style="margin-right: 8px;"></i> Clique em <strong>Gerar QR</strong> para atualizar o código. Use <strong>Testar</strong> para abrir/visualizar.
            </div>
        </div>

        <div class="qr-panel">
            <div id="qrcode"></div>
            <div class="qr-label" id="qrLabel">QR Code gerado</div>
            <div class="qr-sub" id="qrSub">Aguardando ação</div>
            <div id="testButtonContainer"></div>
            <div class="download-container" id="downloadContainer">
                <button class="btn btn-download" onclick="downloadQRCode('png')">
                    <i class="fas fa-download"></i> Baixar PNG
                </button>
                <button class="btn btn-download" onclick="downloadQRCode('jpg')">
                    <i class="fas fa-download"></i> Baixar JPG
                </button>
            </div>
            <!-- Wi-Fi Info -->
            <div class="wifi-info-container hidden" id="wifiInfoContainer">
                <div class="wifi-info-header">
                    <i class="fas fa-wifi"></i>
                    <span>Dispositivos Conectados</span>
                    <button class="wifi-refresh-btn" onclick="refreshWifiDevices()" title="Atualizar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div id="wifiDevicesContent">
                    <div class="wifi-loading">
                        <i class="fas fa-spinner"></i>
                        <span>Verificando dispositivos...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const qrContainer = document.getElementById('qrcode');
        const qrLabel = document.getElementById('qrLabel');
        const qrSub = document.getElementById('qrSub');
        const testContainer = document.getElementById('testButtonContainer');
        const wifiInfoContainer = document.getElementById('wifiInfoContainer');
        const wifiDevicesContent = document.getElementById('wifiDevicesContent');

        let currentTab = 'url';
        let currentTheme = 'light';
        let lastGeneratedText = '';
        let wifiDevices = [];
        let isWifiTabActive = false;

        // Nomes de dispositivos simulados
        const deviceNames = [
            'iPhone 15 Pro', 'Galaxy S24', 'MacBook Air', 'iPad Pro', 
            'Notebook Dell', 'PC Desktop', 'Chromebook', 'Surface Pro',
            'Smart TV LG', 'Amazon Echo', 'Google Nest', 'PlayStation 5',
            'Xbox Series X', 'iPhone 14', 'Galaxy Tab', 'Lenovo ThinkPad'
        ];

        // --- Gerar dispositivos aleatórios ---
        function generateRandomDevices(count) {
            const devices = [];
            const usedNames = new Set();
            
            for (let i = 0; i < count; i++) {
                let name;
                let attempts = 0;
                do {
                    name = deviceNames[Math.floor(Math.random() * deviceNames.length)];
                    attempts++;
                } while (usedNames.has(name) && attempts < 20);
                
                usedNames.add(name);
                const status = Math.random() > 0.15 ? 'connected' : 'idle';
                const signal = Math.floor(Math.random() * 40) + 60; // 60-100%
                
                devices.push({
                    name: name + (Math.random() > 0.7 ? ' 2' : ''),
                    status: status,
                    signal: signal
                });
            }
            return devices;
        }

        // --- Simular verificação de dispositivos Wi-Fi ---
        function simulateWifiDevices() {
            // Número aleatório entre 2 e 12 dispositivos
            const count = Math.floor(Math.random() * 10) + 2;
            wifiDevices = generateRandomDevices(count);
            updateWifiDisplay();
        }

        // --- Atualizar exibição dos dispositivos ---
        function updateWifiDisplay() {
            if (wifiDevices.length === 0) {
                wifiDevicesContent.innerHTML = `
                    <div style="color: var(--text-muted); font-size: 13px; padding: 4px 0;">
                        <i class="fas fa-info-circle"></i> Nenhum dispositivo encontrado
                    </div>
                `;
                return;
            }

            const connected = wifiDevices.filter(d => d.status === 'connected');
            const total = wifiDevices.length;
            
            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span class="wifi-device-count">${connected.length} conectado${connected.length !== 1 ? 's' : ''}</span>
                    <span style="font-size: 12px; color: var(--text-muted);">${total} total</span>
                </div>
                <div class="wifi-devices-grid">
            `;

            wifiDevices.forEach(device => {
                const statusIcon = device.status === 'connected' ? 'fa-check-circle' : 'fa-clock';
                const statusColor = device.status === 'connected' ? 'var(--btn-success)' : 'var(--text-muted)';
                html += `
                    <div class="wifi-device-item">
                        <i class="fas ${statusIcon}" style="color: ${statusColor};"></i>
                        <span>${device.name}</span>
                        <span style="font-size: 10px; color: var(--text-muted);">${device.signal}%</span>
                    </div>
                `;
            });

            html += `</div>`;
            wifiDevicesContent.innerHTML = html;
        }

        // --- Atualizar dispositivos Wi-Fi ---
        window.refreshWifiDevices = function() {
            if (!isWifiTabActive) return;
            
            wifiDevicesContent.innerHTML = `
                <div class="wifi-loading">
                    <i class="fas fa-spinner"></i>
                    <span>Verificando dispositivos...</span>
                </div>
            `;

            // Simular atraso de rede
            setTimeout(() => {
                simulateWifiDevices();
            }, 800 + Math.random() * 600);
        };

        // --- Mostrar/esconder info Wi-Fi ---
        function toggleWifiInfo(show) {
            if (show) {
                wifiInfoContainer.classList.remove('hidden');
                isWifiTabActive = true;
                refreshWifiDevices();
            } else {
                wifiInfoContainer.classList.add('hidden');
                isWifiTabActive = false;
            }
        }

        // --- Abas (modificada para controle do Wi-Fi) ---
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = {
            url: document.getElementById('urlTab'),
            whatsapp: document.getElementById('whatsappTab'),
            wifi: document.getElementById('wifiTab'),
        };

        function getTabIdFromButton(btn) {
            return btn.dataset.tab.replace('Tab', '');
        }

        function switchTab(tabId) {
            Object.values(tabContents).forEach(el => el.classList.add('hidden'));
            const map = {
                'url': tabContents.url,
                'whatsapp': tabContents.whatsapp,
                'wifi': tabContents.wifi,
            };
            if (map[tabId]) map[tabId].classList.remove('hidden');
            tabButtons.forEach(btn => {
                btn.classList.toggle('active', getTabIdFromButton(btn) === tabId);
            });
            currentTab = tabId;

            // Controlar exibição do Wi-Fi info
            if (tabId === 'wifi') {
                toggleWifiInfo(true);
            } else {
                toggleWifiInfo(false);
            }
        }

        // Substituir event listeners das abas
        tabButtons.forEach(btn => {
            btn.removeEventListener('click', function(e) {});
            btn.addEventListener('click', function(e) {
                const tabId = getTabIdFromButton(this);
                switchTab(tabId);
            });
        });

        // --- Tema Claro/Escuro ---
        window.toggleTheme = function() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const themeLabel = document.getElementById('themeLabel');
            const icon = themeToggle.querySelector('i');
            
            if (currentTheme === 'light') {
                html.setAttribute('data-theme', 'dark');
                currentTheme = 'dark';
                themeLabel.textContent = 'Escuro';
                icon.className = 'fas fa-sun';
            } else {
                html.removeAttribute('data-theme');
                currentTheme = 'light';
                themeLabel.textContent = 'Claro';
                icon.className = 'fas fa-moon';
            }
            // Regerar QR para ajustar cores do tema
            if (lastGeneratedText) {
                generateQRCode(lastGeneratedText, qrLabel.textContent, qrSub.textContent);
            }
            localStorage.setItem('theme', currentTheme);
        };

        // --- Gerar QR Code ---
        function generateQRCode(text, label, sub) {
            qrContainer.innerHTML = '';
            if (!text) {
                qrContainer.innerHTML = '<div style="padding: 30px; color: var(--text-muted);">Insira dados válidos</div>';
                qrLabel.textContent = 'Aguardando dados';
                qrSub.textContent = 'Preencha os campos e gere o QR';
                testContainer.innerHTML = '';
                return;
            }
            try {
                const isDark = currentTheme === 'dark';
                new QRCode(qrContainer, {
                    text: text,
                    width: 180,
                    height: 180,
                    colorDark: isDark ? "#e8edf5" : "#121826",
                    colorLight: isDark ? "#1a1d27" : "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                qrLabel.textContent = label || 'QR Code';
                qrSub.textContent = sub || 'Pronto para uso';
                lastGeneratedText = text;
                testContainer.innerHTML = `<div class="test-badge"><i class="fas fa-check-circle"></i> QR gerado com sucesso</div>`;
            } catch (e) {
                qrContainer.innerHTML = `<div style="padding:20px;color:#b91c1c;">Erro: ${e.message}</div>`;
                qrLabel.textContent = 'Erro';
                qrSub.textContent = 'Verifique os dados';
                testContainer.innerHTML = '';
            }
        }

        // --- Função para baixar QR Code ---
        window.downloadQRCode = function(format) {
            const qrElement = qrContainer.querySelector('canvas') || qrContainer.querySelector('img');
            if (!qrElement) {
                alert('Nenhum QR Code para baixar. Gere um QR Code primeiro.');
                return;
            }

            try {
                let link = document.createElement('a');
                let extension = format === 'jpg' ? 'jpg' : 'png';
                let mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';
                
                if (qrElement.tagName === 'CANVAS') {
                    link.download = `qrcode.${extension}`;
                    link.href = qrElement.toDataURL(mimeType, 1.0);
                    link.click();
                } else if (qrElement.tagName === 'IMG') {
                    const canvas = document.createElement('canvas');
                    canvas.width = qrElement.width || 180;
                    canvas.height = qrElement.height || 180;
                    const ctx = canvas.getContext('2d');
                    
                    if (format === 'jpg') {
                        ctx.fillStyle = currentTheme === 'dark' ? '#1a1d27' : '#ffffff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    
                    ctx.drawImage(qrElement, 0, 0, canvas.width, canvas.height);
                    link.download = `qrcode.${extension}`;
                    link.href = canvas.toDataURL(mimeType, 1.0);
                    link.click();
                } else {
                    alert('Formato de QR Code não suportado para download.');
                }
            } catch (error) {
                alert('Erro ao baixar o QR Code: ' + error.message);
            }
        };

        // --- Obter dados da aba atual ---
        function getCurrentData() {
            switch (currentTab) {
                case 'url': {
                    const url = document.getElementById('urlInput').value.trim();
                    if (!url) return { error: 'URL inválida' };
                    return { text: url, label: 'URL', sub: url };
                }
                case 'whatsapp': {
                    let phone = document.getElementById('whatsappInput').value.trim();
                    if (!phone) return { error: 'Número inválido' };
                    phone = phone.replace(/\s/g, '');
                    if (!phone.startsWith('55')) phone = '55' + phone;
                    const waLink = `https://wa.me/${phone}`;
                    return { text: waLink, label: 'WhatsApp', sub: `+${phone}` };
                }
                case 'wifi': {
                    const ssid = document.getElementById('wifiSSID').value.trim();
                    const password = document.getElementById('wifiPassword').value.trim();
                    const security = document.getElementById('wifiSecurity').value;
                    if (!ssid) return { error: 'SSID obrigatório' };
                    let wifiString = `WIFI:T:${security};S:${ssid};`;
                    if (security !== 'nopass' && password) {
                        wifiString += `P:${password};`;
                    }
                    wifiString += ';';
                    return { text: wifiString, label: `Wi-Fi: ${ssid}`, sub: `Seg: ${security}` };
                }
                default: return { error: 'Aba desconhecida' };
            }
        }

        // --- Função para gerar a partir da aba atual ---
        window.generateFromCurrentTab = function() {
            const data = getCurrentData();
            if (data.error) {
                generateQRCode('', 'Erro', data.error);
                return;
            }
            generateQRCode(data.text, data.label, data.sub);
        };

        // --- Função TESTAR ---
        window.testCurrentTab = function() {
            const data = getCurrentData();
            if (data.error) {
                alert(`Erro: ${data.error}`);
                return;
            }
            if (!data.text) {
                alert('Nenhum dado para testar.');
                return;
            }

            switch (currentTab) {
                case 'url': {
                    window.open(data.text, '_blank');
                    break;
                }
                case 'whatsapp': {
                    window.open(data.text, '_blank');
                    break;
                }
                case 'wifi': {
                    alert(`Wi-Fi config:\n${data.text}\n\n(No desktop, use o leitor de QR para conectar)`);
                    break;
                }
                default: alert('Teste não implementado para esta aba.');
            }
        };

        // --- Inicialização ---
        window.addEventListener('DOMContentLoaded', function() {
            switchTab('url');
            setTimeout(() => {
                generateFromCurrentTab();
            }, 100);
            
            // Inicializar tema
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                currentTheme = 'dark';
                document.getElementById('themeLabel').textContent = 'Escuro';
                document.querySelector('#themeToggle i').className = 'fas fa-sun';
            }

            // Atualizar Wi-Fi a cada 30 segundos
            setInterval(() => {
                if (isWifiTabActive) {
                    refreshWifiDevices();
                }
            }, 30000);
        });

        // Expor função de atualização para o escopo global
        window.refreshWifiDevices = function() {
            if (!isWifiTabActive) return;
            
            wifiDevicesContent.innerHTML = `
                <div class="wifi-loading">
                    <i class="fas fa-spinner"></i>
                    <span>Verificando dispositivos...</span>
                </div>
            `;

            setTimeout(() => {
                simulateWifiDevices();
            }, 800 + Math.random() * 600);
        };

    })();
</script>

</body>
</html>
